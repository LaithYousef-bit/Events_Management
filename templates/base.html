<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <title>{% block title %}{% endblock %} - Events Management</title>
</head>
<body>
    <header class="site-header">
        <div class="topbar">
            <div class="brand">Events<span>Hub</span></div>
            <nav class="primary-nav">
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('create_events') }}">Create Event</a>
            </nav>
        </div>
        <div class="hero">
            <h1>Discover Better Events</h1>
            <p>Manage your schedule with modern cards, intuitive forms, and real example events.</p>
            <a href="{{ url_for('create_events') }}" class="btn btn-hero">Add new event</a>
        </div>
    </header>

    <main class="page-content">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; <span id="year"></span> EventsHub — Built for simple event management.</p>
    </footer>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
